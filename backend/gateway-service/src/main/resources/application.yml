server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: restaurant-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/products/**, /api/ai/**
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**, /api/auth/**
