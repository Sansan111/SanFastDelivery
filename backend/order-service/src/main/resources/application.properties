server.port=8082
spring.datasource.url=jdbc:postgresql://localhost:5433/sanfast_db
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.jpa.hibernate.ddl-auto=update

# Kafka Config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Restaurant service base URL (Dev mode A)
restaurant.service.base-url=http://localhost:8081

# JWT Auth (Dev)
jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS}
jwt.expiration-seconds=604800

# Kafka JSON (Order events)
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
sanfast.kafka.topic.order-created=order.created

logging.level.org.springframework.security=DEBUG

# RabbitMQ (Order events)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
sanfast.rabbitmq.exchange=order.events
sanfast.rabbitmq.routing-key.order-created=order.created
